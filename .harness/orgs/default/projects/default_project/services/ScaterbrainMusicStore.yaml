service:
  name: scatterbrain-music
  identifier: scatterbrainmusic
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: k8s
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: ScaterbrainRepositoryConnector
                  gitFetchType: Branch
                  paths:
                    - deployment.yaml
                    - service.yaml
                  branch: main
              skipResourceVersioning: false
              enableDeclarativeRollback: false
        - manifest:
            identifier: values
            type: Values
            spec:
              store:
                type: Harness
                spec:
                  files:
                    - /scaterbrainmusicstore/values
              optionalValuesYaml: false
      variables:
        - name: image.tag
          type: String
          description: ""
          required: true
          value: <+pipeline.sequenceId>
  gitOpsEnabled: false
  orgIdentifier: default
  projectIdentifier: default_project
